[variables]
NIXPACKS_NO_NODE = "1"
PYTHONPATH = "/app"

[phases.setup]
nixPkgs = ["python311", "gcc", "libpq"]

[phases.install]
cmds = ["pip install --no-cache-dir -r mlb/requirements.txt"]

[phases.build]
cmds = []

[start]
# Shell form so $PORT env var expands correctly at runtime
cmd = "sh -c 'uvicorn mlb.api.main:app --host 0.0.0.0 --port ${PORT:-8080}'"
