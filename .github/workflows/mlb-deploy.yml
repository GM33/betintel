name: Deploy MLB Engine to Railway

on:
  push:
    branches: [main]
    paths:
      - 'mlb/**'
      - '.github/workflows/mlb-deploy.yml'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@REPLACE_CHECKOUT_SHA

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy MLB API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service betintel-mlb-api --detach

      - name: Deploy MLB Scheduler
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service betintel-mlb-scheduler --detach
