name: CodeQL Advanced

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python

    steps:
      - name: Checkout
        uses: actions/checkout@REPLACE_WITH_REAL_40_CHAR_SHA

      - name: Initialize CodeQL
        uses: github/codeql-action/init@REPLACE_WITH_REAL_40_CHAR_SHA
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@REPLACE_WITH_REAL_40_CHAR_SHA

      - name: Analyze
        uses: github/codeql-action/analyze@REPLACE_WITH_REAL_40_CHAR_SHA
