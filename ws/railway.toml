# railway.toml — BetIntel WS Server
# Deploy this directory (ws/) as ONE Railway service: the WS server.
# The ingest worker is deployed as a SEPARATE Railway service
# using the same repo root (ws/) with startCommand = "node ingest.js".
# See DEPLOY.md for the full two-service setup.

[build]
  builder     = "nixpacks"
  buildCommand = "npm install --omit=dev"

[deploy]
  startCommand       = "node server.js"
  healthcheckPath    = "/health"
  healthcheckTimeout = 15
  restartPolicyType  = "on_failure"
  restartPolicyMaxRetries = 5

[deploy.environmentVariables]
  NODE_ENV = "production"
  PORT     = "8080"
