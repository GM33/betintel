# Fly.io deployment for BetIntel WebSocket server
# flyctl launch --config ws/fly.toml --dockerfile ws/Dockerfile

app = "betintel-ws"
primary_region = "dfw"   # closest to Laredo TX
kill_signal = "SIGINT"
kill_timeout = 10

[build]
  dockerfile = "Dockerfile"

[env]
  WS_PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # keep alive for persistent WS
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
