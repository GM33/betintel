<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetIntel — Live Betting Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* art direction: sports betting intelligence dashboard
       palette: dark neutral surfaces, teal primary accent
       typography: DM Sans body
       density: compact-to-balanced */

    :root,[data-theme="light"]{
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
      --color-surface-offset:#f3f0ec;--color-surface-offset-2:#edeae5;
      --color-surface-dynamic:#e6e4df;--color-divider:#dcd9d5;--color-border:#d4d1ca;
      --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
      --color-text-inverse:#f9f8f4;
      --color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-active:#0f3638;
      --color-primary-hl:#cedcd8;
      --color-success:#437a22;--color-success-hover:#2e5c10;
      --color-warning:#964219;--color-error:#a12c7b;
      --color-orange:#da7101;--color-gold:#d19900;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
      --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
      --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
      --transition:180ms cubic-bezier(.16,1,.3,1);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
      --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
      --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --content-wide:1200px;
    }
    [data-theme="dark"]{
      --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
      --color-surface-offset:#1d1c1a;--color-surface-offset-2:#22211f;
      --color-surface-dynamic:#2d2c2a;--color-divider:#262523;--color-border:#393836;
      --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
      --color-text-inverse:#2b2a28;
      --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-active:#1a626b;
      --color-primary-hl:#313b3b;
      --color-success:#6daa45;--color-success-hover:#4d8f25;
      --color-warning:#bb653b;--color-error:#d163a7;
      --color-orange:#fdab43;--color-gold:#e8af34;
      --shadow-sm:0 1px 2px oklch(0 0 0/.2);
      --shadow-md:0 4px 12px oklch(0 0 0/.3);
      --shadow-lg:0 12px 32px oklch(0 0 0/.4);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth;}
    body{min-height:100dvh;font-family:'DM Sans',sans-serif;font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);line-height:1.6;}
    img,picture,video,canvas,svg{display:block;max-width:100%;}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    a,button,[role="button"]{transition:color var(--transition),background var(--transition),border-color var(--transition),box-shadow var(--transition);}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

    /* ── LAYOUT ──────────────────────────────────────────────────────────── */
    #app{display:flex;flex-direction:column;min-height:100dvh;}
    #topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-6);background:var(--color-surface);border-bottom:1px solid var(--color-divider);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
    #topbar-logo{display:flex;align-items:center;gap:var(--space-2);font-weight:700;font-size:var(--text-lg);letter-spacing:-.02em;white-space:nowrap;color:var(--color-primary);}
    #topbar-logo svg{width:28px;height:28px;flex-shrink:0;}
    #topbar-title{font-size:var(--text-sm);color:var(--color-text-muted);flex:1;}
    #topbar-date{font-size:var(--text-xs);color:var(--color-text-faint);white-space:nowrap;}
    .topbar-status{display:flex;align-items:center;gap:var(--space-1);font-size:var(--text-xs);font-weight:600;color:var(--color-primary);white-space:nowrap;}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--color-success);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
    #body-wrap{display:flex;flex:1;min-height:0;}
    #sidebar{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:var(--space-1);padding:var(--space-4) var(--space-3);background:var(--color-surface);border-right:1px solid var(--color-divider);position:sticky;top:57px;height:calc(100dvh - 57px);overflow-y:auto;}
    .sidebar-label{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-faint);padding:var(--space-3) var(--space-3) var(--space-1);margin-top:var(--space-2);}
    .nav-item{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--color-text-muted);transition:background var(--transition),color var(--transition);cursor:pointer;width:100%;}
    .nav-item:hover{background:var(--color-surface-offset);color:var(--color-text);}
    .nav-item.active{background:var(--color-primary-hl);color:var(--color-primary);font-weight:600;}
    .nav-item svg{width:16px;height:16px;flex-shrink:0;}
    .nav-item .badge{margin-left:auto;font-size:var(--text-xs);font-weight:700;background:var(--color-primary);color:var(--color-text-inverse);padding:1px 6px;border-radius:var(--radius-full);}
    #main-content{flex:1;min-width:0;overflow-y:auto;}
    #page-body{padding:var(--space-6);max-width:var(--content-wide);}

    /* ── OFFLINE BANNER ──────────────────────────────────────────────────── */
    #offline-banner{display:none;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-6);background:oklch(from var(--color-warning) l c h/.12);border-bottom:1px solid oklch(from var(--color-warning) l c h/.25);font-size:var(--text-sm);color:var(--color-warning);}
    #offline-banner svg{width:16px;height:16px;flex-shrink:0;}

    /* ── HERO BANNER ─────────────────────────────────────────────────────── */
    .hero-banner{background:linear-gradient(135deg,var(--color-primary-active) 0%,var(--color-primary) 60%,oklch(from var(--color-primary) calc(l + .08) c h) 100%);border-radius:var(--radius-xl);padding:var(--space-8) var(--space-8) var(--space-6);margin-bottom:var(--space-6);position:relative;overflow:hidden;min-height:160px;display:flex;flex-direction:column;justify-content:flex-end;}
    .hero-eyebrow{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:oklch(from var(--color-text-inverse) l c h/.55);margin-bottom:var(--space-2);display:flex;align-items:center;gap:4px;}
    .hero-title{font-size:var(--text-xl);font-weight:800;color:var(--color-text-inverse);line-height:1.05;letter-spacing:-.03em;font-variant-numeric:tabular-nums;}
    .hero-sub{font-size:var(--text-sm);color:oklch(from var(--color-text-inverse) l c h/.65);max-width:38ch;margin-top:var(--space-2);}
    .hero-stats{display:flex;gap:var(--space-6);margin-top:var(--space-4);}
    .hero-stat{display:flex;flex-direction:column;}
    .hero-stat-val{font-size:var(--text-lg);font-weight:800;color:var(--color-text-inverse);font-variant-numeric:tabular-nums;}
    .hero-stat-label{font-size:var(--text-xs);color:oklch(from var(--color-text-inverse) l c h/.55);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
    .hero-sport-icons{position:absolute;bottom:var(--space-4);right:var(--space-8);display:flex;gap:var(--space-3);opacity:.2;pointer-events:none;color:var(--color-text-inverse);}
    .hero-sport-icons svg{width:28px;height:28px;}

    /* ── TICKER ──────────────────────────────────────────────────────────── */
    .ticker{overflow:hidden;background:var(--color-surface-offset);border:1px solid var(--color-divider);border-radius:var(--radius-md);padding:var(--space-2) 0;margin-bottom:var(--space-4);}
    .ticker-track{display:flex;gap:var(--space-4);white-space:nowrap;animation:ticker-scroll 40s linear infinite;}
    .ticker-track:hover{animation-play-state:paused;}
    @keyframes ticker-scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
    .ticker-item{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);font-weight:500;padding:0 var(--space-3);}
    .t-team{font-weight:700;color:var(--color-text);}
    .t-odds{color:var(--color-primary);font-weight:700;}
    .ticker-sep{color:var(--color-text-faint);}

    /* ── SPORT STRIP ─────────────────────────────────────────────────────── */
    .sport-strip{display:flex;gap:var(--space-2);overflow-x:auto;padding:0 0 var(--space-3);-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:var(--space-4);}
    .sport-strip::-webkit-scrollbar{display:none;}
    .sport-tile{display:flex;flex-direction:column;align-items:center;gap:var(--space-1);padding:var(--space-2) var(--space-4);border-radius:var(--radius-lg);border:1px solid var(--color-border);background:var(--color-surface);cursor:pointer;transition:border-color var(--transition),background var(--transition),color var(--transition);flex-shrink:0;min-width:64px;}
    .sport-tile:hover{border-color:var(--color-primary);background:var(--color-primary-hl);color:var(--color-primary);}
    .sport-tile.active{border-color:var(--color-primary);background:var(--color-primary-hl);color:var(--color-primary);}
    .sport-tile.active .sport-tile-icon{color:var(--color-primary);}
    .sport-tile-icon{display:flex;align-items:center;justify-content:center;width:20px;height:20px;color:var(--color-text-muted);}
    .sport-tile-icon svg{width:16px;height:16px;}
    .sport-tile-label{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-muted);}
    .sport-tile .cnt{background:var(--color-primary);color:var(--color-text-inverse);font-size:var(--text-xs);font-weight:800;border-radius:var(--radius-full);padding:1px 5px;min-width:16px;text-align:center;display:none;}
    .sport-tile .cnt.show{display:inline-block;}

    /* ── KPI STRIP ───────────────────────────────────────────────────────── */
    .kpi-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:var(--space-3);margin-bottom:var(--space-6);}
    .kpi-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-1);box-shadow:var(--shadow-sm);transition:box-shadow var(--transition);}
    .kpi-card:hover{box-shadow:var(--shadow-md);}
    .kpi-label{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);}
    .kpi-val{font-size:var(--text-xl);font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;color:var(--color-text);}
    .kpi-delta{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:var(--space-1);}

    /* ── SECTION HEADER ──────────────────────────────────────────────────── */
    .section-header{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);margin-bottom:var(--space-4);flex-wrap:wrap;}
    .section-title{font-size:var(--text-lg);font-weight:700;letter-spaci
